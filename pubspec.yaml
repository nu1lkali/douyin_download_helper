name: douyin_downloader
description: 抖音无水印视频下载工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  dio: ^5.4.0
  device_info_plus: ^9.1.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  file_picker: ^6.1.1
  # 无需第三方相册库，通过原生MethodChannel实现

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6

flutter:
  uses-material-design: true
